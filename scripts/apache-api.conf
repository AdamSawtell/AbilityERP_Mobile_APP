# AbilityERP Worker API — Apache snippet (iDempiere EC2 default)
# Add INSIDE the <VirtualHost *:80> block, BEFORE the catch-all ProxyPass to iDempiere.
#
#   Include /opt/ability-erp-pwa/scripts/apache-api.conf

ProxyPass /api/ http://127.0.0.1:3001/api/
ProxyPassReverse /api/ http://127.0.0.1:3001/api/
